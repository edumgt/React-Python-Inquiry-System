# docker-compose.airgap.yml
# Air-gap overlay: overrides the standard docker-compose.yml so that
# pre-loaded Docker images are used directly without pulling from a registry
# or building from source.
#
# Usage (air-gapped machine, after running scripts/airgap-load.sh):
#   docker compose -f docker-compose.yml -f docker-compose.airgap.yml up -d
#
# The image names (inquiry-backend, inquiry-frontend) match those tagged by
# airgap-save.sh and declared in docker-compose.yml.

services:
  db:
    image: postgres:16-alpine
    pull_policy: never

  backend:
    image: inquiry-backend
    pull_policy: never
    build: {}

  frontend:
    image: inquiry-frontend
    pull_policy: never
    build: {}
