services:
  db:
    image: postgres:16-alpine
    container_name: inquiry-db
    environment:
      POSTGRES_DB: inquiry
      POSTGRES_USER: inquiry
      POSTGRES_PASSWORD: inquiry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inquiry -d inquiry"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    image: inquiry-backend
    container_name: inquiry-backend
    environment:
      DATABASE_URL: postgresql+psycopg://inquiry:inquiry@db:5432/inquiry
      SECRET_KEY: replace-this-secret-key-in-production
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:9000"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: inquiry-frontend
    container_name: inquiry-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9000:80"
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
